spring:
  application:
    name: careerpilot-ai

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: careerpilot

  flyway:
    enabled: true
    default-schema: careerpilot
    schemas: careerpilot