spring:
  application:
    name: careerpilot-ai
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}?currentSchema=careerpilot
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        default_schema: careerpilot

  flyway:
    enabled: true
    default-schema: careerpilot
    schemas: careerpilot
    locations:
      - classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: redis
    redis:
      time-to-live: 24h
      cache-null-values: false

security:
  jwt:
    secret: ${JWT_SECRET:Q2FyZWVyUGlsb3RBdXRoU2VjcmV0S2V5Rm9yRGV2RW52aXJvbm1lbnQxMjM0NTY3ODkwMTIzNDU2Nzg5MA==}
    access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}